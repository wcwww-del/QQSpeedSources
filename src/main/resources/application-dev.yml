# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api  # 接口前缀
  tomcat:
    uri-encoding: UTF-8

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.20.10.14:3306/feiche_data?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 替换成你的MySQL账号
    password: AIni,.77  # 替换成你的MySQL密码
  # Redis配置
  redis:
    host: 172.20.10.14 # Redis 服务器地址（本地/服务器IP）
    port: 6379 # Redis 端口（默认6379）
    password: # Redis 密码（无密码则留空）
    database: 0 # 使用的数据库索引（默认0）
    timeout: 10000 # 连接超时时间（毫秒）
    # 连接池配置（可选）
    lettuce:
      pool:
        max-active: 8 # 最大连接数
        max-idle: 8 # 最大空闲连接
        min-idle: 0 # 最小空闲连接
        max-wait: -1 # 最大等待时间（-1表示无限制）